name: CI - Integración Continua

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Análisis estático de código
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar flake8 (análisis estático)
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --statistics

  test:
    name: Pruebas unitarias
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas con cobertura
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            --junitxml=test-results.xml \
            -v

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            test-results.xml

  security-sonarqube:
    name: Análisis de seguridad - SonarQube
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias y generar cobertura
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --junitxml=test-results.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  security-snyk:
    name: Análisis de seguridad - Snyk
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Snyk - Escaneo de dependencias
        uses: snyk/actions/python-3.12@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=requirements.txt

      - name: Snyk - Escaneo de imagen Docker
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: devops-lab:${{ github.sha }}
          args: --severity-threshold=high --file=Dockerfile

  build-docker:
    name: Construir imagen Docker
    runs-on: ubuntu-latest
    needs: [security-sonarqube, security-snyk]

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen (verificación)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          tags: devops-lab:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
