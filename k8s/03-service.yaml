apiVersion: v1
kind: Service
metadata:
  name: devops-lab-service
  namespace: devops-lab
  labels:
    app: devops-lab
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "5000"
spec:
  type: NodePort
  selector:
    app: devops-lab
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30080
